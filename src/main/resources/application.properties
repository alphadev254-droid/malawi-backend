# ====================================
# WRMIS Integration Configuration
# ====================================
# JWT secret for signing WRMIS tokens (minimum 256 bits / 32 characters required)
wrmis.jwt.secret=${WRMIS_JWT_SECRET:wrmis_jwt_secret_key_minimum_256_bits_required_for_hmac_security_algorithm}
# Token expiration in milliseconds (default: 1 hour)
wrmis.jwt.expiration=${WRMIS_JWT_EXPIRATION:3600000}

